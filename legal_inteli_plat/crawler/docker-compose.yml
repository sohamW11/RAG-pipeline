version: '3.9'
services:
  crawler:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./crawler.db
      - CRAWLER_CONFIG_PATH=/app/crawler/config/settings.yaml
    volumes:
      # Mount the source as the `crawler` package (matches the Dockerfile).
      - .:/app/crawler
